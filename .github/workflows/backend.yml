name: Backend

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync
          ls -la .venv/bin/ 2>/dev/null || echo "no .venv/bin"

      - name: Debug PATH
        run: |
          echo "Python: $(which python)"
          echo "PATH: $PATH"
          uv run python -c "import ruff; print('ruff:', ruff.__version__)" 2>&1 || echo "ruff import failed"
          ls -la .venv/bin/ruff 2>/dev/null || echo "ruff binary not found"

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest -v
