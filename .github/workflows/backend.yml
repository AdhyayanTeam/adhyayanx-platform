name: Backend

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv
          uv sync --frozen

      - name: Lint and test
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          ruff check .
          ruff format --check .
          mypy .
          pytest -v
